<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">QuoteKit dashboard preview</title>
  <desc id="desc">Dashboard interface with proposal status cards, proposal editor, pricing table, and client activity.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="36" fill="#eef2f7"/>
  <g filter="url(#shadow)">
    <rect x="70" y="58" width="1260" height="784" rx="32" fill="url(#panel)"/>
  </g>
  <rect x="70" y="58" width="1260" height="82" rx="32" fill="#0f172a"/>
  <rect x="70" y="108" width="1260" height="42" fill="#0f172a"/>
  <rect x="110" y="87" width="34" height="34" rx="9" fill="url(#accent)"/>
  <path d="M119 96h16v4h-16zm0 9h16v4h-16zm0 9h10v4h-10z" fill="#fff"/>
  <text x="158" y="111" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">QuoteKit</text>
  <rect x="1030" y="86" width="118" height="34" rx="17" fill="#1e293b"/>
  <rect x="1165" y="86" width="122" height="34" rx="17" fill="#2563eb"/>

  <g transform="translate(110 182)">
    <rect width="250" height="620" rx="24" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="30" y="48" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Workspace</text>
    <rect x="24" y="82" width="202" height="44" rx="14" fill="#dbeafe"/>
    <text x="54" y="110" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Dashboard</text>
    <rect x="24" y="144" width="202" height="44" rx="14" fill="#ffffff"/>
    <text x="54" y="172" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Proposals</text>
    <rect x="24" y="206" width="202" height="44" rx="14" fill="#ffffff"/>
    <text x="54" y="234" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Clients</text>
    <rect x="24" y="268" width="202" height="44" rx="14" fill="#ffffff"/>
    <text x="54" y="296" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Templates</text>
    <rect x="30" y="452" width="190" height="118" rx="20" fill="#0f172a"/>
    <text x="54" y="492" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="14">Win rate</text>
    <text x="54" y="536" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">68%</text>
  </g>

  <g transform="translate(398 184)">
    <text x="0" y="26" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Proposal pipeline</text>
    <text x="0" y="58" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="17">Track every quote from draft to signed.</text>
    <g transform="translate(0 92)">
      <rect width="240" height="118" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="26" y="42" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Drafts</text>
      <text x="26" y="88" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">14</text>
    </g>
    <g transform="translate(270 92)">
      <rect width="240" height="118" rx="22" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="26" y="42" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Accepted</text>
      <text x="26" y="88" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">$82k</text>
    </g>
    <g transform="translate(540 92)">
      <rect width="240" height="118" rx="22" fill="#fefce8" stroke="#fde68a"/>
      <text x="26" y="42" fill="#a16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Avg. response</text>
      <text x="26" y="88" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">2.4d</text>
    </g>
    <g transform="translate(0 250)">
      <rect width="780" height="310" rx="24" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="30" y="46" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Website redesign proposal</text>
      <rect x="598" y="24" width="132" height="34" rx="17" fill="#ccfbf1"/>
      <text x="624" y="46" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Viewed</text>
      <rect x="30" y="82" width="336" height="14" rx="7" fill="#cbd5e1"/>
      <rect x="30" y="112" width="684" height="12" rx="6" fill="#e2e8f0"/>
      <rect x="30" y="138" width="602" height="12" rx="6" fill="#e2e8f0"/>
      <rect x="30" y="188" width="720" height="72" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
      <text x="58" y="232" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Discovery and strategy</text>
      <text x="610" y="232" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">$4,500</text>
    </g>
  </g>

  <g transform="translate(1210 196)">
    <rect width="70" height="70" rx="20" fill="url(#accent)"/>
    <path d="M23 24h24v6H23zm0 13h24v6H23zm0 13h15v6H23z" fill="#fff"/>
  </g>
</svg>
