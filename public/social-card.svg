<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">QuoteKit social preview</title>
  <desc id="desc">A proposal and quote workspace preview with pricing, sections, and proposal status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="110" r="150" fill="#bfdbfe" opacity="0.35"/>
  <circle cx="105" cy="535" r="190" fill="#99f6e4" opacity="0.32"/>
  <g transform="translate(96 78)">
    <rect width="1008" height="474" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <rect width="1008" height="72" rx="28" fill="#0f172a"/>
    <rect y="48" width="1008" height="32" fill="#0f172a"/>
    <rect x="36" y="25" width="26" height="26" rx="7" fill="url(#brand)"/>
    <path d="M43 32h12v3H43zm0 7h12v3H43zm0 7h8v3h-8z" fill="#fff"/>
    <text x="78" y="47" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">QuoteKit</text>
    <rect x="788" y="22" width="82" height="28" rx="14" fill="#334155"/>
    <rect x="886" y="22" width="86" height="28" rx="14" fill="#2563eb"/>
    <g transform="translate(48 118)">
      <text font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#111827">Build proposals</text>
      <text y="68" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#111827">that close faster.</text>
      <text y="122" font-family="Inter, Arial, sans-serif" font-size="25" fill="#475569">Branded client proposals, pricing tables, secure sharing, and analytics.</text>
      <rect y="166" width="172" height="50" rx="14" fill="url(#brand)"/>
      <text x="28" y="198" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Create quote</text>
      <rect x="194" y="166" width="168" height="50" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="225" y="198" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Track status</text>
    </g>
    <g transform="translate(620 122)">
      <rect width="312" height="250" rx="22" fill="#f8fafc" stroke="#dbe3ef"/>
      <rect x="28" y="30" width="168" height="18" rx="9" fill="#111827"/>
      <rect x="28" y="68" width="252" height="12" rx="6" fill="#cbd5e1"/>
      <rect x="28" y="94" width="224" height="12" rx="6" fill="#e2e8f0"/>
      <rect x="28" y="132" width="252" height="54" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
      <rect x="46" y="151" width="86" height="12" rx="6" fill="#64748b"/>
      <rect x="206" y="148" width="48" height="18" rx="9" fill="#14b8a6"/>
      <rect x="28" y="204" width="112" height="28" rx="14" fill="#dbeafe"/>
      <rect x="152" y="204" width="128" height="28" rx="14" fill="#ccfbf1"/>
